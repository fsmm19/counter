<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Contador</title>
    <script>
      document.documentElement.dataset.theme =
        localStorage.getItem('theme') ??
        (window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light');
    </script>
  </head>
  <body>
    <main class="counter">
      <div class="counter__actions">
        <button
          id="btn-reset"
          class="btn btn--reset"
          title="Resetear"
          aria-label="Resetear"
        >
          <svg
            aria-hidden="true"
            width="24"
            height="24"
            viewBox="0 0 512 512"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M64,256H34A222,222,0,0,1,430,118.15V85h30V190H355V160h67.27A192.21,192.21,0,0,0,256,64C150.13,64,64,150.13,64,256Zm384,0c0,105.87-86.13,192-192,192A192.21,192.21,0,0,1,89.73,352H157V322H52V427H82V393.85A222,222,0,0,0,478,256Z"
            />
          </svg>
        </button>
        <button
          id="btn-theme"
          class="btn btn--theme"
          title="Cambiar tema"
          aria-label="auto"
          aria-live="polite"
        >
          <svg
            class="theme-icon"
            aria-hidden="true"
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <mask id="moon-mask">
              <rect x="0" y="0" width="100%" height="100%" fill="white" />
              <circle id="moon-circle" cx="24" cy="10" r="6" fill="black" />
            </mask>
            <circle
              class="sun"
              cx="12"
              cy="12"
              r="6"
              mask="url(#moon-mask)"
              fill="currentColor"
            />
            <g
              class="sun-beams"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </g>
          </svg>
        </button>
      </div>
      <output
        id="counter-display"
        class="counter__value"
        for="btn--increment btn--decrement"
        >0</output
      >
      <div class="counter__controls">
        <button
          id="btn-decrement"
          class="btn btn--decrement"
          aria-label="Decrementar"
        >
          −
        </button>
        <button
          id="btn-increment"
          class="btn btn--increment"
          aria-label="Incrementar"
        >
          +
        </button>
      </div>
    </main>
    <script src="src/main.js" type="module"></script>
  </body>
</html>
