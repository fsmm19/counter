<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Contador</title>
    <script>
      document.documentElement.dataset.theme =
        localStorage.getItem('theme') ??
        (window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light');
    </script>
  </head>
  <body>
    <main class="counter">
      <div class="counter__actions">
        <div class="counter__actions-group">
          <button
            id="btn-settings"
            class="btn btn--settings"
            data-tooltip="Configuración"
            aria-label="Configuración"
          >
            <svg
              aria-hidden="true"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
          </button>
          <button
            id="btn-info"
            class="btn btn--info"
            data-tooltip="Información"
            aria-label="Información"
          >
            <svg
              aria-hidden="true"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
          </button>
        </div>
        <div class="counter__actions-group">
          <button
            id="btn-theme"
            class="btn btn--theme"
            data-tooltip="Cambiar tema"
            aria-label="auto"
            aria-live="polite"
          >
            <svg
              class="theme-icon"
              aria-hidden="true"
              width="24"
              height="24"
              viewBox="0 0 24 24"
            >
              <mask id="moon-mask">
                <rect x="0" y="0" width="100%" height="100%" fill="white" />
                <circle id="moon-circle" cx="24" cy="10" r="6" fill="black" />
              </mask>
              <circle
                class="sun"
                cx="12"
                cy="12"
                r="6"
                mask="url(#moon-mask)"
                fill="currentColor"
              />
              <g
                class="sun-beams"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </g>
            </svg>
          </button>
          <button
            id="btn-reset"
            class="btn btn--reset"
            data-tooltip="Resetear"
            aria-label="Resetear"
          >
            <svg
              aria-hidden="true"
              width="24"
              height="24"
              viewBox="0 0 512 512"
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M64,256H34A222,222,0,0,1,430,118.15V85h30V190H355V160h67.27A192.21,192.21,0,0,0,256,64C150.13,64,64,150.13,64,256Zm384,0c0,105.87-86.13,192-192,192A192.21,192.21,0,0,1,89.73,352H157V322H52V427H82V393.85A222,222,0,0,0,478,256Z"
              />
            </svg>
          </button>
        </div>
      </div>
      <output
        id="counter-display"
        class="counter__value"
        for="btn--increment btn--decrement"
        >0</output
      >
      <div class="counter__controls">
        <button
          id="btn-decrement"
          class="btn btn--decrement"
          aria-label="Decrementar"
          data-tooltip="Decrementar"
        >
          −
        </button>
        <button
          id="btn-increment"
          class="btn btn--increment"
          aria-label="Incrementar"
          data-tooltip="Incrementar"
        >
          +
        </button>
      </div>
    </main>
    <dialog
      id="modal-settings"
      class="modal"
      aria-labelledby="modal-settings-title"
    >
      <div class="modal__panel">
        <div class="modal__header">
          <h2 id="modal-settings-title" class="modal__title">Configuración</h2>
          <button
            id="btn-modal-close"
            class="btn btn--modal-close"
            aria-label="Cerrar"
          >
            <svg
              aria-hidden="true"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <form id="form-settings" class="modal__form" novalidate>
          <label class="modal__field">
            <span class="modal__label">Valor del contador</span>
            <input
              id="input-count"
              class="modal__input"
              type="number"
              min="-9999"
              max="9999"
            />
            <span
              id="error-count"
              class="modal__error"
              aria-live="polite"
            ></span>
          </label>
          <label class="modal__field">
            <span class="modal__label">Intervalo</span>
            <input id="input-step" class="modal__input" type="number" min="1" />
            <span
              id="error-step"
              class="modal__error"
              aria-live="polite"
            ></span>
          </label>
          <div class="modal__footer">
            <button type="button" id="btn-modal-cancel" class="btn btn--cancel">
              Cancelar
            </button>
            <button type="submit" class="btn btn--apply">Aplicar</button>
          </div>
        </form>
      </div>
    </dialog>
    <dialog id="modal-info" class="modal" aria-labelledby="modal-info-title">
      <div class="modal__panel">
        <div class="modal__header">
          <h2 id="modal-info-title" class="modal__title">Información</h2>
          <button
            id="btn-modal-info-close"
            class="btn btn--modal-close"
            aria-label="Cerrar"
          >
            <svg
              aria-hidden="true"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal__info">
          <p class="modal__description">
            Contador simple para llevar el registro de cualquier cosa.
          </p>
          <section class="modal__info-section">
            <h3 class="modal__info-heading">Atajos de teclado</h3>
            <ul class="modal__shortcuts">
              <li class="modal__shortcut">
                <div class="modal__shortcut-keys">
                  <kbd>+</kbd><kbd>↑</kbd><kbd>→</kbd>
                </div>
                <span>Incrementar</span>
              </li>
              <li class="modal__shortcut">
                <div class="modal__shortcut-keys">
                  <kbd>−</kbd><kbd>↓</kbd><kbd>←</kbd>
                </div>
                <span>Decrementar</span>
              </li>
            </ul>
          </section>
          <a
            class="modal__repo-link"
            href="https://github.com/fsmm19/counter"
            target="_blank"
            rel="noopener noreferrer"
          >
            <svg
              aria-hidden="true"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
              />
            </svg>
            fsmm19/counter
          </a>
        </div>
      </div>
    </dialog>
    <script src="src/main.js" type="module"></script>
  </body>
</html>
